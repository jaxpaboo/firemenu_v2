<header class="topbar" (dblclick)="onHeaderDoubleClick($event)" [ngStyle]="{ 'z-index': isModalActive() ? 10 : 100 }">
  <div class="brand-section">
    <div class="brand">Fire Menu</div>
    <div class="tabs-dropdown" aria-label="Primary navigation">
      <button class="tab-toggle" type="button">
        {{ getCurrentTabLabel() }}
      </button>
      <div class="dropdown-menu">
        <button
          *ngFor="let tab of tabs"
          [class.active]="selectedTab === tab.value"
          class="dropdown-item"
          type="button"
          (click)="selectTab(tab.value)">
          {{ tab.label }}
        </button>
      </div>
    </div>
    <button
      *ngIf="!isAuthenticated"
      class="btn btn-outline btn-outline-primary"
      type="button"
      (click)="toggleLoginPanel()">
      Login
    </button>
  </div>

  <div class="header-controls">
    <div class="settings-menu">
      <button
        class="gear-btn"
        type="button"
        aria-label="Open settings menu"
        aria-haspopup="true"
        [attr.aria-expanded]="showSettingsMenu"
        (click)="toggleSettingsMenu()">
        &#9881;
      </button>

      <div class="settings-dropdown" *ngIf="showSettingsMenu">
        <button *ngIf="isAuthenticated" class="settings-item" type="button" (click)="onLogoutClick()">
          Logout
        </button>
        <div class="settings-version">v{{ appVersion }}</div>
      </div>
    </div>
  </div>
</header>

<app-login-modal
  [visible]="showLoginPanel"
  [email]="authEmail"
  [password]="authPassword"
  [error]="authError"
  (emailChange)="authEmail = $event"
  (passwordChange)="authPassword = $event"
  (submit)="isAuthenticated ? logout() : login($event)"
  (close)="toggleLoginPanel()"
></app-login-modal>

<main class="page">
  <section class="list-panel">
    <div class="list-header" (dblclick)="onHeaderDoubleClick($event)" [ngStyle]="{ 'z-index': isModalActive() ? 10 : 50 }">
      <div class="list-header-row">
        <div>
          <p class="section-label">Fire Links -- <b>{{selectedTab.toUpperCase()}}</b></p>
        </div>
        <div class="list-actions">
          <button
            type="button"
            class="scroll-top-btn"
            [hidden]="isModalActive()"
            (click)="scrollToTop()"
            aria-label="Scroll to top">
            ↑
          </button>
          <button class="btn btn-success" type="button" (click)="startNew()" [hidden]="!isAuthenticated">New Fire Link</button>
        </div>
      </div>
    </div>

    <app-fire-link-list
      [items]="getDisplayedItems()"
      [isAuthenticated]="isAuthenticated"
      [currentTab]="selectedTab"
      (editItem)="editItem($event)"
      (deleteItem)="deleteItem($event)"
      (toggleFavorite)="toggleFavorite($event)"
      (toggleWatched)="toggleWatched($event)"
      (confirmationNeeded)="onConfirmationNeeded($event)"
    ></app-fire-link-list>
    <div class="list-header-row">
      <div class="list-actions">
        <button
          class="scroll-down-btn"
          [hidden]="isModalActive()"
          (click)="scrollToBottom()"
          aria-label="Scroll to bottom">
          ↓
        </button>
      </div>
    </div>
    
  </section>

  <app-fire-link-form
    [visible]="showModal"
    [model]="formModel"
    [isEditing]="isEditing"
    [isAuthenticated]="isAuthenticated"
    (save)="save($event)"
    (cancel)="cancel()"
    (delete)="deleteItem($event)"
  ></app-fire-link-form>

</main>

<app-confirmation-toast
  [visible]="showConfirmation"
  [message]="confirmationMessage"
  (confirm)="onConfirmationConfirm()"
  (cancel)="onConfirmationCancel()"
></app-confirmation-toast>
